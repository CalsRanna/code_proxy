name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build macos

      - name: Package macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y CodeProxy-macOS.zip "code_proxy.app"

      - uses: actions/upload-artifact@v4
        with:
          name: CodeProxy-macOS
          path: build/macos/Build/Products/Release/CodeProxy-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows

      - name: Package Windows app
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath CodeProxy-Windows.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: CodeProxy-Windows
          path: CodeProxy-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libsqlite3-dev ninja-build pkg-config cmake

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux

      - name: Package Linux app
        run: tar -czf CodeProxy-Linux.tar.gz -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: CodeProxy-Linux
          path: CodeProxy-Linux.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            CodeProxy-macOS.zip
            CodeProxy-Windows.zip
            CodeProxy-Linux.tar.gz
          generate_release_notes: true
